server.port=8081
server.servlet.context-path=/api

# 数据库连接配置
# 默认端口改为 3307 (连接 Docker 数据库)，避免与本地 MySQL (3306) 冲突
spring.datasource.url=jdbc:mysql://localhost:${DB_PORT:3307}/hy_compliance_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:hy_root_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis\u914D\u7F6E
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.hy_backend.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.call-setters-on-nulls=true

# Volcengine Ark (Doubao) Config
volcengine.ark.apiKey=2089245b-f313-48fe-af40-20147bcb36d5
volcengine.ark.baseUrl=https://ark.cn-beijing.volces.com/api/v3
volcengine.ark.model=ep-20260302180403-6ks2j
